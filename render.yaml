services:

* type: web
  name: zamor-backend
  runtime: node
  rootDir: server
  plan: free
  buildCommand: npm install
  startCommand: npm start
  healthCheckPath: /health
  autoDeploy: true
  envVars:

  * key: NODE_ENV
    value: production
  * key: PORT
    value: 10000
  * key: DB_HOST
    sync: false
  * key: DB_PORT
    value: 3306
  * key: DB_USER
    sync: false
  * key: DB_PASSWORD
    sync: false
  * key: DB_NAME
    sync: false
  * key: JWT_SECRET
    sync: false
  * key: CLIENT_URL
    sync: false

* type: static
  name: zamor-frontend
  rootDir: client
  buildCommand: npm install && npm run build
  publishDir: build
